<head>

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Ski vs. the Multiverse">
    <meta property="og:title" content="Ski vs. the Multiverse">
    <meta property="og:description" content="Check out the latest Ski vs. the Multiverse videos, music, and updates.">
    <meta property="og:url" content="https://themiisquadron.github.io/Ski_vs_the_Multiverse/">
    <meta property="og:image" content="https://themiisquadron.github.io/Ski_vs_the_Multiverse/img/ski_mv_embed.png">
    <meta property="og:image:alt" content="Ski vs. the Multiverse logo on a starry multiverse background">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ski vs. the Multiverse">
    <meta name="twitter:description" content="Check out the latest Ski vs. the Multiverse videos, music, and updates.">
    <meta name="twitter:image" content="https://themiisquadron.github.io/Ski_vs_the_Multiverse/img/ski_mv_embed.png">

</head>
<body class="page-index">
        <div id="launch-gate">
        <section class="gate-panel">
            <h1 class="gate-title">&#128274;ACCESS RESTRICTED&#128274;</h1>
            <p class="gate-subtitle">Unlocks on: <span id="unlock-date"></span></p>
            <p id="countdown" class="countdown">00d 00h 00m 00s</p>
            <button id="bypass-timer-btn" type="button">Enter Password:</button>
            <div id="timer-password-modal" class="timer-password-modal" aria-hidden="true">
                <div class="timer-password-card">
                    <p class="timer-password-title">Enter Dev Password:</p>
                    <form id="timer-password-form"> 
                        <input id="timer-password-input" class="timer-password-input" type="password" autocomplete="off">
                        <p id="timer-password-error" class="timer-password-error" role="alert"></p>
                        <div class="timer-password-actions">
                            <button id="timer-password-submit" type="submit">Unlock</button>
                            <button id="timer-password-cancel" type="button">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

        </section>
    </div>
    <div id="site-content">
        <button id="lock-website-btn" type="button" aria-label="Lock website">&#128274;</button>
        <img class="hero-logo" src="img/ski_mv_logo.png" alt="Ski vs. the Multiverse logo">
        <div>
            <p class="nav-links">  
                <a class="comic" href="https://drive.google.com/drive/u/0/folders/1f2vb2xTKqE3F2omhAfcLLgEeNR-SxEd0">FLPs</a>  
                <a class="comic" href="videos.html">Videos</a>
                <a class="comic" href="downloads.html">Downloads</a>
            </p>
        </div>
        <div class="video-container">
            <!-- Ski vs. the Multiverse - FNF - Pico (Ski Mix) -->
            <iframe src="https://www.youtube.com/embed/zNiFHrY6FSI" allowfullscreen></iframe>
        </div>
        <div class="audio-player">
            <div class="genesis-wrap">
                <img class="genesis-gif" src="img/ski-genesis.gif" alt="Ski Genesis animation">
            </div>
            <p class="now-playing">Now Playing: <span class="song-title"></span> <span class="mix-title"></span></p>
            <audio id="bg-music" controls autoplay loop preload="auto">
                <source src="img/Skilestial.mp3" type="audio/wav">
            </audio>
        </div>
    </div>
    <script src="img/Unlock Timer.js"></script>
    <script>
        (function () {
            const audio = document.getElementById('bg-music');
            const volumeKey = 'ski_bg_music_volume';
            const timeKey = 'ski_bg_music_time';
            const songTitleKey = 'ski_bg_music_song_title';
            const mixTitleKey = 'ski_bg_music_mix_title';
            
            // NOW PLAYING: SONG TITLE & MIX TITLE
            const nowPlayingSongTitle = 'Skilestial';
            const nowPlayingMixTitle = '(Title Theme)'; 
            

            const songTitleEl = document.querySelector('.song-title');
            const mixTitleEl = document.querySelector('.mix-title');

            if (songTitleEl) {
                songTitleEl.textContent = nowPlayingSongTitle;
            }
            if (mixTitleEl) {
                mixTitleEl.textContent = nowPlayingMixTitle;
            }
            try {
                localStorage.setItem(songTitleKey, nowPlayingSongTitle);
                localStorage.setItem(mixTitleKey, nowPlayingMixTitle);
            } catch (_) {}
            if (songTitleEl || mixTitleEl) {
                try {
                    localStorage.setItem('ski_bg_music_title', (nowPlayingSongTitle + ' ' + nowPlayingMixTitle).trim());
                } catch (_) {}
            }

            try {
                const savedVolume = parseFloat(localStorage.getItem(volumeKey));
                if (Number.isFinite(savedVolume)) {
                    audio.volume = Math.max(0, Math.min(1, savedVolume));
                } else {
                    audio.volume = 0.5;
                }
            } catch (_) {
                audio.volume = 0.5;
            }

            audio.addEventListener('loadedmetadata', function () {
                try {
                    const savedTime = parseFloat(localStorage.getItem(timeKey));
                    if (Number.isFinite(savedTime) && savedTime >= 0 && savedTime < audio.duration) {
                        audio.currentTime = savedTime;
                    }
                } catch (_) {}
            });

            audio.addEventListener('volumechange', function () {
                try {
                    localStorage.setItem(volumeKey, String(audio.volume));
                } catch (_) {}
            });

            setInterval(function () {
                try {
                    if (!audio.paused) {
                        localStorage.setItem(timeKey, String(audio.currentTime));
                    }
                } catch (_) {}
            }, 1000);
        })();
    </script>
</body>
</html>
